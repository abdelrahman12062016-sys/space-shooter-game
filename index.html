<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Shooter - Ultimate Alles-Modus</title>
    <style>
        body {
            margin: 0;
            background-color: #020617;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
        }
        canvas {
            border: 2px solid #334155;
            background-color: #020617;
            display: block;
        }
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .hidden { display: none !important; }
        button {
            background-color: #00e5ff;
            color: #020617;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 15px;
        }
        button:hover { background-color: #fff; }
        #hud {
            position: absolute;
            top: 10px; left: 10px; right: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            pointer-events: none;
            z-index: 5;
        }
        #admin-panel {
            position: absolute;
            bottom: 10px; left: 10px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid #a855f7;
            padding: 10px;
            border-radius: 5px;
            z-index: 20;
        }
        .cheat-btn {
            background-color: #a855f7;
            color: white;
            font-size: 12px;
            padding: 6px 10px;
            margin: 2px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud" class="hidden">
        <div>SCORE: <span id="score-val">0</span></div>
        <div>USER: <span id="user-val">abdullahminihoofd (ROOT)</span></div>
        <div>LIVES: <span id="lives-val">3</span></div>
    </div>

    <div id="start-screen" class="screen">
        <h1>SPACE SHOOTER: ALLES-MODUS</h1>
        <p>Ingetrapt als Admin: <strong>abdullahminihoofd</strong></p>
        <button onclick="startGame()">START GAME</button>
    </div>

    <div id="game-over-screen" class="screen hidden">
        <h1 style="color: #ff304f;">GAME OVER</h1>
        <p>Eindscore: <span id="final-score">0</span></p>
        <button onclick="startGame()">OPNIEUW PROBEREN</button>
    </div>

    <div id="admin-panel">
        <div style="color: #a855f7; font-weight: bold; font-size: 12px; margin-bottom: 5px;">🔧 ADMIN PANEL (M)</div>
        <button class="cheat-btn" onclick="triggerCheat('godmode')">Godmode</button>
        <button class="cheat-btn" onclick="triggerCheat('nuke')">Nuke</button>
        <button class="cheat-btn" onclick="triggerCheat('score')">+1000 Score</button>
    </div>

    <canvas id="game" width="800" height="600"></canvas>
</div>

<script>
// --- GAME ENGINE ---
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let gameStarted = false, gameOver = false, score = 0, lives = 3, godmode = false;
let player = { x: 385, y: 500, size: 32, speed: 6 };
let bullets = [], enemies = [], stars = [], particles = [], keys = {};

// Sterren vullen
for (let i = 0; i < 50; i++) stars.push({ x: Math.random() * 800, y: Math.random() * 600, speed: 1 + Math.random() * 2 });

function startGame() {
    gameStarted = true; gameOver = false; score = 0; lives = 3; enemies = []; bullets = [];
    player.x = 385; player.y = 500;
    document.getElementById("start-screen").classList.add("hidden");
    document.getElementById("game-over-screen").classList.add("hidden");
    document.getElementById("hud").classList.remove("hidden");
    document.getElementById("score-val").innerText = score;
    document.getElementById("lives-val").innerText = lives;
}

function triggerCheat(type) {
    if (type === 'godmode') { godmode = !godmode; alert("Godmode: " + (godmode ? "AAN" : "UIT")); }
    if (type === 'score') { score += 1000; document.getElementById("score-val").innerText = score; }
    if (type === 'nuke') { enemies = []; for(let i=0; i<30; i++) particles.push({x: Math.random()*800, y: Math.random()*600, dx: Math.random()*4-2, dy: Math.random()*4-2, size: 4, color: "#ff304f", alpha: 1}); }
}

window.addEventListener("keydown", e => {
    keys[e.key.toLowerCase()] = true;
    if (e.key === " ") { // Sprenkel lasers
        bullets.push({ x: player.x + 14, y: player.y, size: 4, speed: -10 });
    }
    if (e.key.toLowerCase() === "m") { // Schakel admin paneel visueel
        const p = document.getElementById("admin-panel");
        p.classList.toggle("hidden");
    }
});
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

function update() {
    if (!gameStarted || gameOver) return;

    // Sterren scrollen
    stars.forEach(s => { s.y += s.speed; if (s.y > 600) s.y = 0; });

    // Besturing speler
    if ((keys["w"] || keys["arrowup"]) && player.y > 0) player.y -= player.speed;
    if ((keys["s"] || keys["arrowdown"]) && player.y < 600 - player.size) player.y += player.speed;
    if ((keys["a"] || keys["arrowleft"]) && player.x > 0) player.x -= player.speed;
    if ((keys["d"] || keys["arrowright"]) && player.x < 800 - player.size) player.x += player.speed;

    // Kogels bewegen
    for (let i = bullets.length - 1; i >= 0; i--) {
        bullets[i].y += bullets[i].speed;
        if (bullets[i].y < 0) bullets.splice(i, 1);
    }

    // Vijanden bewegen & aanvaringen
    for (let i = enemies.length - 1; i >= 0; i--) {
        enemies[i].y += enemies[i].speed;
        if (enemies[i].y > 600) { enemies.splice(i, 1); continue; }

        // Kogel raakt vijand
        for (let j = bullets.length - 1; j >= 0; j--) {
            if (bullets[j].x > enemies[i].x && bullets[j].x < enemies[i].x + enemies[i].size && bullets[j].y > enemies[i].y && bullets[j].y < enemies[i].y + enemies[i].size) {
                // Explosie deeltjes
                for(let p=0; p<8; p++) particles.push({x: enemies[i].x+12, y: enemies[i].y+12, dx: Math.random()*4-2, dy: Math.random()*4-2, size: 3, color: "#fff176", alpha: 1});
                enemies.splice(i, 1);
                bullets.splice(j, 1);
                score += 10;
                document.getElementById("score-val").innerText = score;
                break;
            }
        }

        // Vijand raakt speler
        if (enemies[i] && enemies[i].x < player.x + player.size && enemies[i].x + enemies[i].size > player.x && enemies[i].y < player.y + player.size && enemies[i].y + enemies[i].size > player.y) {
            enemies.splice(i, 1);
            if (!godmode) {
                lives--;
                document.getElementById("lives-val").innerText = lives;
                if (lives <= 0) {
                    gameOver = true;
                    document.getElementById("game-over-screen").classList.remove("hidden");
                    document.getElementById("final-score").innerText = score;
                }
            }
        }
    }

    // Deeltjes updaten
    for(let i = particles.length - 1; i >= 0; i--) {
        particles[i].x += particles[i].dx; particles[i].y += particles[i].dy; particles[i].alpha -= 0.02;
        if(particles[i].alpha <= 0) particles.splice(i, 1);
    }
}

function draw() {
    ctx.fillStyle = "#020617"; ctx.fillRect(0, 0, 800, 600);
    ctx.fillStyle = "#ffffff"; stars.forEach(s => ctx.fillRect(s.x, s.y, 2, 2));
    
    particles.forEach(p => { ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.size, p.size); ctx.restore(); });

    if (!gameStarted || gameOver) return;

    // Speler (Neon blauw)
    ctx.fillStyle = "#00e5ff"; ctx.fillRect(player.x, player.y, player.size, player.size);
    // Vijanden (Rood)
    ctx.fillStyle = "#ff304f"; enemies.forEach(e => ctx.fillRect(e.x, e.y, e.size, e.size));
    // Kogels (Geel)
    ctx.fillStyle = "#fff176"; bullets.forEach(b => ctx.fillRect(b.x, b.y, b.size, b.size));
}

// Enemy spawner klok
setInterval(() => { if (gameStarted && !gameOver) enemies.push({ x: Math.random() * 776, y: -24, size: 24, speed: 2 + Math.random()*2 }); }, 1000);

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>

</body>
</html>
