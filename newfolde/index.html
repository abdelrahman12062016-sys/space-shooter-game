<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shooter space Game </title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-wrapper">
    <div id="hud" class="hud hidden">
      <div>Lives: <span id="lives">3</span></div>
      <div>Score: <span id="score">0</span></div>
      <div>High Score: <span id="high-score">0</span></div>
    </div>
    <div class="game-area">
      <canvas id="game"></canvas>
      <button id="pause-button" class="pause-button hidden" aria-label="Pause game">
        <span></span>
        <span></span>
      </button>
      <button id="settings-button" class="settings-button" title="Settings" aria-label="Settings">⚙</button>
      <div id="pause-screen" class="pause-screen hidden">
        <div class="pause-panel">
          <h1>Paused</h1>
          <div class="pause-actions">
            <button id="stay-button" class="icon-button" title="Resume" aria-label="Resume">
              <span class="icon">▶</span>
            </button>
            <button id="pause-leave-button" class="icon-button leave" title="Leave" aria-label="Leave">
              <span class="icon">⏏</span>
            </button>
          </div>
        </div>
      </div>
      <div id="settings-screen" class="settings-screen hidden">
        <div class="settings-panel">
          <h1>Settings</h1>
          <p>Choose controls</p>
          <div class="settings-options">
            <button id="pc-mode-button" class="icon-button" title="PC Controls" aria-label="PC Controls">
              <span class="icon">⌨</span>
            </button>
            <button id="mobile-mode-button" class="icon-button" title="Mobile Controls" aria-label="Mobile Controls">
              <span class="icon">📱</span>
            </button>
          </div>
          <button id="close-settings-button" class="icon-button" title="Close Settings" aria-label="Close Settings">
            <span class="icon">✕</span>
          </button>
        </div>
      </div>
      <div id="mobile-controls" class="mobile-controls hidden">
        <div class="mobile-dpad">
          <button data-move="w" title="Up" aria-label="Up">▲</button>
          <button data-move="a" title="Left" aria-label="Left">◀</button>
          <button data-move="s" title="Down" aria-label="Down">▼</button>
          <button data-move="d" title="Right" aria-label="Right">▶</button>
        </div>
        <button id="mobile-shoot-button" class="mobile-shoot-button" title="Shoot" aria-label="Shoot">⦿</button>
      </div>
      <div id="start-screen" class="start-screen">
        <h1 class="game-logo">Shooter Space Game</h1>
        <div class="start-info">
          <p>WASD to move</p>
          <p>Click to shoot</p>
          <p>Survive as long as possible</p>
        </div>
        <button id="start-button" class="icon-button" title="Start Game" aria-label="Start Game">
          <span class="icon">▶</span>
        </button>
      </div>
      <div id="game-over-screen" class="game-over-screen hidden">
        <div class="game-over-panel">
          <h1 class="game-logo">Shooter Space Game</h1>
          <h2>Game Over</h2>
          <p>Final Score</p>
          <div class="final-score" id="final-score">0</div>
          <p>High Score</p>
          <div class="game-over-high-score" id="final-high-score">0</div>
          <div class="game-over-actions">
            <button id="play-again-button" class="icon-button restart" title="Play Again" aria-label="Play Again">
              <span class="icon">▶</span>
            </button>
            <button id="game-over-leave-button" class="icon-button leave" title="Leave" aria-label="Leave">
              <span class="icon">⏏</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
